name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    name: Build & test (macOS)
    # GitHub-hosted macOS runners aren't available on this account (jobs fail in
    # ~3s because no runner can be allocated), so CI runs on a self-hosted macOS
    # runner — Leon's Mac. The custom "mustard" label ensures only that machine
    # picks up these jobs. To register one, see docs/ci-self-hosted-runner.md.
    runs-on: [self-hosted, macOS, mustard]
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
