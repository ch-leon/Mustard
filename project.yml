# XcodeGen spec for the iOS companion (BAK-108, ADR-0004).
# macOS stays on SPM (Package.swift) — `swift build`/`swift test` are unchanged. This
# project is ADDITIVE and defines ONLY the iOS app, which compiles the platform-agnostic
# core (Models + Logic + MustardContainer) directly into the app module. The macOS-only
# Agent layer (ClaudeRunner → Process) and AppKit Views are deliberately excluded; the
# mobile screens (BAK-110+) add their own SwiftUI views here.
#
# Regenerate + build the simulator app with ./build-ios.sh (needs `xcodegen`).
name: MustardMobile
options:
  bundleIdPrefix: com.codeheroes.mustard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: "YES"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  MustardMobile:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codeheroes.mustard.ios
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        # Device signing: set MUSTARD_TEAM_ID (your Apple Developer Team ID) before
        # `xcodegen generate` and Xcode auto-signs for your device. Unset → empty, which
        # is fine for the Simulator (build-ios.sh passes CODE_SIGNING_ALLOWED=NO). Keeps
        # your Team ID out of git + survives regeneration (no manual Xcode step to redo).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${MUSTARD_TEAM_ID}
    sources:
      - path: Sources/MustardMobile
      # The platform-agnostic core. Views/ is AppKit (macOS-only) and excluded; the
      # mobile screens (BAK-110+) add their own SwiftUI views under Sources/MustardMobile.
      # ClaudeRunner's Process path is #if os(macOS)-guarded with an iOS stub.
      - path: Sources/MustardKit
        excludes:
          - "Views/**"
          - "PreviewData.swift"
          # The resumable CLI runtime and its serial coordinator run the `claude`
          # process (macOS-only, ADR-0003) and are used only by the macOS Views/app.
          # iOS reads/writes the shared conversation data but never executes turns.
          - "Agent/ClaudeTaskRuntime.swift"
          - "Agent/AgentTaskCoordinator.swift"
